name: Crawl

on:
  schedule:
    # 5:30pm Pacific on M/W/F
    - cron: '30 0 * * 2,4,6'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: report planned work, but do not actually upload or change anything'
        type: boolean
        default: true
      test_seeds:
        description: 'Use test seeds'
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

env:
  BROWSERTRIX_IMAGE: 'webrecorder/browsertrix-crawler:1.5.11'

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      SAVE_RESULTS: ${{ (github.event_name == 'schedule' || inputs.dry_run == false) && 'true' || 'false' }}
    outputs:
      collection: ${{ steps.setup-collection.outputs.name }}
      collection_path: ${{ steps.setup-collection.outputs.path }}
      save_results: ${{ env.SAVE_RESULTS }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --all-extras --dev

      - name: Get test seeds
        if: ${{ inputs.test_seeds }}
        run: |
          cp test.crawl.yaml seeds.crawl.yaml

      - name: Get active seeds
        if: ${{ !inputs.test_seeds }}
        env:
          WEB_MONITORING_DB_USER: '${{ secrets.WEB_MONITORING_DB_USER }}'
          WEB_MONITORING_DB_PASSWORD: '${{ secrets.WEB_MONITORING_DB_PASSWORD }}'
        run: |
          uv run edgi-wm-crawler seeds --format browsertrix > seeds.crawl.yaml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CRAWLER_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CRAWLER_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Get Browsertrix-Crawler
        run: |
          docker pull '${{ env.BROWSERTRIX_IMAGE }}'

      - id: setup-collection
        run: |
          timestamp="$(date +'%Y%m%d%H%M%S')"

          # Important: double dash will be used later to make the name nicer.
          collection="test-crawl--${timestamp}"
          collection_path="crawls/collections/${collection}"
          echo "name=${collection}" >> "$GITHUB_OUTPUT"
          echo "path=${collection_path}" >> "$GITHUB_OUTPUT"

      - name: Crawl
        run: |
          ./crawl.sh ./seeds.crawl.yaml '${{ steps.setup-collection.outputs.name }}'

      - name: Upload to S3
        if: ${{ env.SAVE_RESULTS == 'true' }}
        run: |
          aws s3 cp --recursive \
            '${{ steps.setup-collection.outputs.path }}' \
            's3://${{ secrets.CRAWLER_S3_BUCKET }}/${{ steps.setup-collection.outputs.name }}'

      - name: Upload to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crawl-output
          path: '${{ steps.setup-collection.outputs.path }}'
          retention-days: 7

  import-db:
    needs:
      - crawl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --all-extras --dev

      - uses: actions/download-artifact@v4
        with:
          name: crawl-output
          path: crawl

      - name: Import to web-monitoring-db
        env:
          WEB_MONITORING_DB_USER: '${{ secrets.WEB_MONITORING_DB_USER }}'
          WEB_MONITORING_DB_PASSWORD: '${{ secrets.WEB_MONITORING_DB_PASSWORD }}'
          WEB_MONITORING_DB_S3_BUCKET: '${{ secrets.WEB_MONITORING_DB_S3_BUCKET }}'
          DRY_RUN_OPTION: ${{ needs.crawl.outputs.save_results == 'false' && '--dry-run' || '' }}
        run: |
          collection='${{ needs.crawl.outputs.collection }}'

          uv run wm-warc-import \
            --archive-s3 "${WEB_MONITORING_DB_S3_BUCKET}" \
            --seeds "crawl/crawls/config.${collection}.yaml" \
            ${{ env.DRY_RUN_OPTION }} \
            crawl/archive/*.warc.gz

  upload-ia:
    needs:
      - crawl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --all-extras --dev

      - uses: actions/download-artifact@v4
        with:
          name: crawl-output
          path: crawl

      - name: Derive options
        id: options
        run: |
          collection='${{ needs.crawl.outputs.collection }}'

          nice_name="$(
            echo "${collection}" \
            | sed -E 's/^(.*)--([0-9]{4})([0-9]{2})([0-9]{2}).*/\1/' \
            | sed -E 's/-/ /' \
            | sed -E 's/[[:alnum:]]+/\u&/g'
          )"
          iso_date="$(
            echo "${collection}" \
            | sed -E 's/^.*--([0-9]{4})([0-9]{2})([0-9]{2}).*/\1-\2-\3/'
          )"

          echo "identifier=${collection}" >> "$GITHUB_OUTPUT"
          echo "iso_date=${iso_date}" >> "$GITHUB_OUTPUT"
          echo "title=${nice_name} ${iso_date}" >> "$GITHUB_OUTPUT"

      # The IA CLI does not currently support env vars (it used to), so manually
      # write a config file.
      # See: https://github.com/jjjake/internetarchive/issues/640
      - name: Configure ia CLI
        run: |
          config_dir=~/.config/internetarchive
          mkdir -p $config_dir
          (
            echo '[s3]'
            echo 'access = ${{ secrets.IAS3_ACCESS_KEY }}'
            echo 'secret = ${{ secrets.IAS3_SECRET_KEY }}'
          ) > $config_dir/ia.ini

      - name: Upload to IA
        if: ${{ needs.crawl.outputs.save_results == 'true' }}
        run: |
          uv run ia upload \
              --metadata="mediatype:web" \
              --metadata="title:${{ steps.options.outputs.title }}" \
              --metadata="date:${{ steps.options.outputs.iso_date }}" \
              '${{ steps.options.outputs.identifier }}' \
             crawl/archive/* \
             crawl/logs/* \
             crawl/pages/*
